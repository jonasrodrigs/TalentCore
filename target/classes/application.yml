###############################################################
# PROFILE PADRÃO (MVP) — SEM BANCO DE DADOS
# Usa o repositório In-Memory (BeanConfig → @Profile("mvp"))
# Desliga autoconfig de DataSource/JdbcTemplate (seu adapter Oracle
# usa DatabaseConfig.getConnection() quando o perfil "oracle" estiver ativo).
###############################################################
spring:
  profiles:
    active: mvp  # Perfil padrão ao subir a aplicação

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Propriedades do JWT (usadas por JwtService):
security:
  jwt:
    # Você pode sobrescrever via variável de ambiente JWT_SECRET
    secret: ${JWT_SECRET:dev-secret-please-change-32bytes-or-more-123456}
    # Expiração do token em minutos (padrão 120). Pode sobrescrever via JWT_EXP_MINUTES
    exp-minutes: ${JWT_EXP_MINUTES:120}


###############################################################
# PROFILE ORACLE — COM BANCO DE DADOS
# Usa o CandidatoRepositoryOracle (BeanConfig → @Profile("oracle"))
# Mantém EXCLUÍDA a autoconfig do DataSource, pois o adapter Oracle
# usa DatabaseConfig.getConnection() lendo variáveis do ambiente:
#   - TC_DB_URL       (ex.: jdbc:oracle:thin:@//localhost:1521/XEPDB1)
#   - TC_DB_USER      (ex.: TALENTCORE)
#   - TC_DB_PASSWORD  (ex.: sua_senha)
###############################################################
---
spring:
  config:
    activate:
      on-profile: oracle

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# (Opcional) Você pode definir um secret diferente em produção/oracle:
security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-prod-please-32bytes-min}
    exp-minutes: ${JWT_EXP_MINUTES:120}