###############################################################
# PROFILE PADRÃO (MVP) — SEM BANCO DE DADOS
# Usa o repositório In-Memory (BeanConfig → @Profile("mvp"))
# Desliga autoconfig de DataSource/JdbcTemplate (o adapter Oracle
# usa DatabaseConfig.getConnection() apenas no perfil "oracle").
###############################################################
spring:
  profiles:
    active: oracle   # <<< PERFIL ATIVO ATUAL (ajuste para 'mvp' se quiser InMemory)

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Propriedades do JWT (usadas por JwtService):
security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-prod-please-32bytes-min}
    exp-minutes: ${JWT_EXP_MINUTES:120}

###############################################################
# PROFILE ORACLE — COM BANCO DE DADOS
# Usa o CandidatoRepositoryOracle (BeanConfig → @Profile("oracle"))
# Mantém EXCLUÍDA a autoconfig do DataSource; o adapter Oracle
# usa DatabaseConfig.getConnection() lendo variáveis de ambiente:
#   - TC_DB_URL       (ex.: jdbc:oracle:thin:@//192.168.101.10:1521/XEPDB1)
#   - TC_DB_USER      (ex.: TALENTCORE)
#   - TC_DB_PASSWORD  (ex.: sua_senha)
###############################################################
---
spring:
  config:
    activate:
      on-profile: oracle

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-prod-please-32bytes-min}
    exp-minutes: ${JWT_EXP_MINUTES:120}

# (opcional) Log básico
logging:
  level:
    root: INFO
    br.com.talentcore: INFO

###############################################################
# PROFILE MVP — IN-MEMORY (sem banco)
###############################################################
---
spring:
  config:
    activate:
      on-profile: mvp

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-32bytes-or-more-123456}
    exp-minutes: ${JWT_EXP_MINUTES:120}

logging:
  level:
    root: INFO
    br.com.talentcore: INFO